<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>モニター案件登録</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; background: #f5f5f5; padding: 16px; }
    h1 { font-size: 18px; color: #333; margin-bottom: 20px; text-align: center; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 14px; color: #555; margin-bottom: 6px; font-weight: bold; }
    select, input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; background: #fff; }
    .section { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
    .section-title { font-size: 13px; color: #06c755; font-weight: bold; margin-bottom: 12px; }
    .hidden { display: none; }
    button { width: 100%; padding: 16px; background: #06c755; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 8px; }
    button:disabled { background: #aaa; }
    .required { color: red; margin-left: 4px; }
  </style>
</head>
<body>
  <h1>📦 モニター案件登録</h1>

  <div class="section">
    <div class="section-title">基本情報</div>

    <div class="form-group">
      <label>会社名<span class="required">*</span></label>
      <select id="company" onchange="onCompanyChange()">
        <option value="">選択してください</option>
        <option>VOICE</option>
        <option>ringo🍎</option>
        <option>e GIFT</option>
        <option>e GIFT VIP</option>
        <option>スキマde調査隊！</option>
        <option>プレモニ</option>
        <option>JOB LINK</option>
        <option>モニたま</option>
        <option>アマレポ</option>
        <option>コエくる！</option>
        <option>SEASON</option>
      </select>
    </div>

    <div class="form-group">
      <label>案件名<span class="required">*</span></label>
      <input type="text" id="item" placeholder="例：〇〇シャンプー">
    </div>

    <div class="form-group">
      <label>購入先<span class="required">*</span></label>
      <select id="store" onchange="onStoreChange()">
        <option value="">選択してください</option>
        <option>Amazon</option>
        <option>楽天</option>
        <option>Yahoo!ショッピング</option>
        <option>tiktok</option>
        <option>LOFT</option>
        <option>その他</option>
      </select>
    </div>

    <div class="form-group">
      <label>購入日<span class="required">*</span></label>
      <input type="date" id="buyDate">
    </div>

    <div class="form-group">
      <label>購入金額（円）<span class="required">*</span></label>
      <input type="number" id="price" placeholder="例：1980">
    </div>

    <div class="form-group">
      <label>報酬（円）</label>
      <input type="number" id="reward" value="0">
    </div>
  </div>

  <!-- 定期解約（Amazon・楽天以外） -->
  <div class="section hidden" id="cancelSection">
    <div class="section-title">定期解約確認</div>
    <div class="form-group">
      <label>定期解約<span class="required">*</span></label>
      <select id="cancel">
        <option value="">選択してください</option>
        <option value="ー">なし（ー）</option>
        <option value="必須">必須</option>
      </select>
    </div>
  </div>

  <!-- e GIFT専用 -->
  <div class="section hidden" id="egiftSection">
    <div class="section-title">e GIFT / e GIFT VIP 専用</div>
    <div class="form-group">
      <label>購入回<span class="required">*</span></label>
      <select id="buyRound">
        <option value="">選択してください</option>
        <option>第1回</option>
        <option>第2回</option>
        <option>第3回</option>
        <option>第4回</option>
        <option>第5回</option>
      </select>
    </div>
  </div>

  <button id="submitBtn" onclick="submitForm()">登録する</button>

  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbyxD9gJcAV0dipX7YbBkLvF0-ZU-mBc1hrqJKEtvaoxSzGRRuu0LfWFYYaB8irI0Yt9/exec';

    // 今日の日付をデフォルト設定
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('buyDate').value = today;

    // LIFF初期化
    liff.init({ liffId: '2009778653-gjYpeDel' }).catch(err => console.error(err));

    function onCompanyChange() {
      const company = document.getElementById('company').value;
      const egiftSection = document.getElementById('egiftSection');
      if (company === 'e GIFT' || company === 'e GIFT VIP') {
        egiftSection.classList.remove('hidden');
      } else {
        egiftSection.classList.add('hidden');
      }
    }

    function onStoreChange() {
      const store = document.getElementById('store').value;
      const cancelSection = document.getElementById('cancelSection');
      if (store === 'その他') {
        cancelSection.classList.remove('hidden');
      } else {
        cancelSection.classList.add('hidden');
      }
    }

    async function submitForm() {
      const company  = document.getElementById('company').value;
      const item     = document.getElementById('item').value;
      const store    = document.getElementById('store').value;
      const buyDate  = document.getElementById('buyDate').value;
      const price    = document.getElementById('price').value;
      const reward   = document.getElementById('reward').value;
      const cancel   = document.getElementById('cancel').value || 'ー';
      const buyRound = document.getElementById('buyRound').value || '';

      if (!company || !item || !store || !buyDate || !price) {
        alert('必須項目を入力してください');
        return;
      }

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = '送信中...';

      try {
        await fetch(GAS_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ company, item, store, buyDate, price, reward, cancel, buyRound })
        });
        alert('登録完了しました！');
        liff.closeWindow();
      } catch (err) {
        alert('エラーが発生しました。再度お試しください。');
        btn.disabled = false;
        btn.textContent = '登録する';
      }
    }
  </script>
</body>
</html>
